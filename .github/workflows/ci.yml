# =============================================================================
# arch-mcp-server CI  (Story M0-2 — Track-1 CI safety-net)
#
# WHAT THIS DOES
#   Provisions an Archi headless runtime on a Linux GitHub runner and invokes the
#   M0-1 headless harness (tools/run-tests.sh) UNMODIFIED on every push / PR. A
#   non-quarantined test failure makes the build go red before it can merge.
#
# TWO-LANE DESIGN (declared from day one)
#   Lane 1 — ci-junit  (ACTIVE): the pure-JUnit headless bucket
#            (181 classes / 4082 tests). No display needed → no xvfb.
#   Lane 2 — ci-pde    (ACTIVE since m0-2b — GROUP B subset): the 3 SWT-display
#            classes in tools/osgi-excluded-tests.txt, run under xvfb via the
#            UNMODIFIED M0-1 harness (tools/run-tests.sh) in explicit-FQCN mode.
#            The 6 OSGi/Archi-runtime classes (GROUP A) remain DEFERRED — see
#            backlog row ci-pde-osgi-pde-testapp-spike. The m0-2b SPIKE found the
#            provisioned Archi RCP ships NO PDE JUnit runtime bundles (no
#            org.eclipse.pde.junit.runtime / jdt.junit*.runtime / org.junit), so a
#            headless `coretestapplication` would need extra bundle provisioning
#            the audit flagged as diminishing returns; those 6 stay owner-gated
#            via the Eclipse AllPluginTestsRunner. Do NOT add xvfb or OSGi
#            machinery to ci-junit (it stays the no-display pure-JUnit lane).
#
# ARCHI VERSION POLICY  (read before bumping)
#   `ARCHI_VERSION` below is the SINGLE source of truth and is PINNED on purpose.
#   CI that gates merges must be reproducible: the same commit must produce the
#   same result tomorrow. We deliberately do NOT auto-fetch "latest Archi" —
#   a third-party release could turn the build red with no change on our side,
#   and the cache would thrash.
#     * To TEST a future Archi (e.g. 5.10.0 once it is published) with ZERO file
#       edits: run this workflow via "Run workflow" (workflow_dispatch) and type
#       the version into the `archi_version` input.
#     * To ADOPT it permanently once green: change the one `ARCHI_VERSION` line.
#   Current public latest is 5.9.0 (github.com/archimatetool/archi.io/releases).
#   The dev-box gate runs an Archi 5.10.0 NIGHTLY (no public Linux tarball yet);
#   the M0-1 headless baseline (181/4082/PASS) reproduces byte-for-byte against
#   public 5.9.0 — verified during M0-2 dev (zero drift). Bump to 5.10.0 here
#   when archimatetool publishes a 5.10.0 Linux build.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      archi_version:
        description: "Archi version to provision (blank = repo default ARCHI_VERSION). Use to test a new Archi release with no file edits."
        required: false
        default: ""

# Least privilege: read the code. The summary is written to the job summary tab (no separate
# check run), so no `checks: write` is needed.
permissions:
  contents: read

env:
  # ---- SINGLE SOURCE OF TRUTH for the pinned Archi version (see policy header) ----
  ARCHI_VERSION: "5.9.0"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Lane 1 — ci-junit : the headless pure-JUnit bucket (ACTIVE)
  # ===========================================================================
  ci-junit:
    name: ci-junit (headless harness)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # AC-5: the harness needs `zip` to strip prod.jar directory entries so
      # getResourceAsStream-on-a-directory matches a deployed bundle. Without it
      # the harness prints "WARN: 'zip' not found" and resource semantics diverge.
      # ubuntu-latest usually ships zip; ensure it deterministically anyway.
      - name: Ensure zip is installed (resource-semantics parity)
        run: command -v zip >/dev/null || { sudo apt-get update && sudo apt-get install -y zip; }

      # Resolve the effective Archi version: workflow_dispatch input wins, else the
      # pinned env default. One place downstream steps + cache keys read from.
      - name: Resolve Archi version
        id: archi
        env:
          INPUT_VERSION: ${{ github.event.inputs.archi_version }}
          DEFAULT_VERSION: ${{ env.ARCHI_VERSION }}
        run: |
          VERSION="${INPUT_VERSION:-$DEFAULT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Provisioning Archi $VERSION"

      # AC-3 / AC-9: cache the extracted Archi distribution, keyed on the version so
      # a bump auto-busts it. A warm run restores ~/archi-dist and skips the ~166 MB
      # download below (the `if: cache-hit != true` guard).
      - name: Cache Archi distribution
        id: cache-archi
        uses: actions/cache@v4
        with:
          path: ~/archi-dist
          key: archi-${{ runner.os }}-${{ steps.archi.outputs.version }}

      - name: Download + extract Archi (cache miss only)
        if: steps.cache-archi.outputs.cache-hit != 'true'
        env:
          VERSION: ${{ steps.archi.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://github.com/archimatetool/archi.io/releases/download/${VERSION}/Archi-Linux64-${VERSION}.tgz"
          echo "Downloading $URL"
          mkdir -p ~/archi-dist
          curl -fsSL --retry 3 -o /tmp/archi.tgz "$URL"
          tar xzf /tmp/archi.tgz -C ~/archi-dist
          rm -f /tmp/archi.tgz

      # AC-3: ARCHI_HOME is the dir containing plugins/ (Linux layout: <extract>/Archi).
      - name: Locate ARCHI_HOME
        id: archihome
        run: |
          set -euo pipefail
          plugins_dir="$(find "$HOME/archi-dist" -maxdepth 3 -type d -name plugins | head -1)"
          [ -n "$plugins_dir" ] || { echo "::error::no plugins/ dir found under ~/archi-dist (corrupt or empty Archi cache?)"; exit 1; }
          ARCHI_HOME="$(dirname "$plugins_dir")"
          [ -d "$ARCHI_HOME/plugins" ] || { echo "::error::ARCHI_HOME/plugins not found under ~/archi-dist"; exit 1; }
          echo "ARCHI_HOME=$ARCHI_HOME" >> "$GITHUB_ENV"
          echo "Archi plugin jars: $(find "$ARCHI_HOME/plugins" -name '*.jar' | wc -l) (ARCHI_HOME=$ARCHI_HOME)"

      # AC-4 / AC-9: cache ~/.m2, keyed on the pinned-coordinate pom so a pin change busts it.
      - name: Cache Maven repository (Mockito + JUnit/Hamcrest)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('tools/ci/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-

      # AC-4: populate ~/.m2 with the version-pinned Mockito stack + JUnit/Hamcrest, then
      # provision an ECLIPSE_HOME/plugins dir holding the JUnit/Hamcrest jars under the
      # Eclipse OSGi-qualified names the harness globs (org.junit_4*.jar / org.hamcrest_*.jar).
      # This is OQ-2 path (a): the glob is satisfied by provisioning Eclipse-named jars, so
      # tools/run-tests.sh stays BYTE-IDENTICAL to the macOS dev box (M0-1 AC-8). Maven-Central
      # names (junit-4.13.2.jar) would NOT match the glob — hence the copy-and-rename.
      - name: Provision test dependencies (Mockito + Eclipse-named JUnit/Hamcrest)
        id: deps
        run: |
          set -euo pipefail
          mvn -q -B -f tools/ci/pom.xml dependency:go-offline
          M2="$HOME/.m2/repository"
          ECLIPSE_HOME="$RUNNER_TEMP/eclipse-junit"
          mkdir -p "$ECLIPSE_HOME/plugins"
          # Copy + rename to the Eclipse OSGi-qualified pattern the harness globs (run-tests.sh:80-83).
          cp "$M2/junit/junit/4.13.2/junit-4.13.2.jar"            "$ECLIPSE_HOME/plugins/org.junit_4.13.2.jar"
          cp "$M2/org/hamcrest/hamcrest/3.0/hamcrest-3.0.jar"     "$ECLIPSE_HOME/plugins/org.hamcrest_3.0.0.jar"
          echo "ECLIPSE_HOME=$ECLIPSE_HOME" >> "$GITHUB_ENV"
          ls -1 "$ECLIPSE_HOME/plugins"

      # AC-2 / AC-6 / AC-7 / AC-10: run the M0-1 harness UNMODIFIED. The script auto-discovers
      # every *Test.java (minus tools/osgi-excluded-tests.txt) and emits surefire XML; its exit
      # code IS the gate (non-zero on any non-quarantined failure or a testsRun==0 violation).
      #
      # M1/S1-READY: because the harness auto-discovers *Test.java, the M1/S1 security regression
      # test will be picked up and run here with ZERO edits to this workflow the moment it lands.
      #
      # NOTE: no -XstartOnFirstThread / no --swt / no xvfb — the Linux default path is exactly the
      # no-display pure-JUnit bucket. Do not swallow the exit code (no `|| true`).
      # `tee` to a log for the summary step; `set -eo pipefail` makes a non-zero harness exit
      # fail THIS step (pipefail picks it up over tee's 0) — the exit code remains the sole gate.
      # Do not swallow it (no `|| true`).
      - name: Run headless test harness
        run: |
          set -euo pipefail
          ARCHI_HOME="$ARCHI_HOME" \
          ECLIPSE_HOME="$ECLIPSE_HOME" \
          M2_REPO="$HOME/.m2/repository" \
          BUILD_DIR="$GITHUB_WORKSPACE/build/test-harness" \
          RESULTS_DIR="$GITHUB_WORKSPACE/build/test-results" \
          bash tools/run-tests.sh | tee "$RUNNER_TEMP/harness.log"

      # AC-8: publish the surefire XML as an artifact even when the suite is red.
      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml
          path: build/test-results/*.xml
          if-no-files-found: warn

      # AC-8: human-readable summary on the run's own (correctly green/red) job, via the job
      # summary tab — NOT a separate check run. A third-party XML reporter (e.g. mikepenz) would
      # mark its OWN check failure on the quarantined pins (tools/known-failing-tests.txt), which
      # are emitted to XML as failing but are NON-gating — that false-red check would violate
      # AC-7 ("must not go red merely because a class is quarantined"). The harness's own output
      # already labels [KNOWN] (quarantined) vs real failures and prints the authoritative
      # SUMMARY/RESULT lines, so we surface those. The job's red/green is the harness exit code.
      - name: Test summary
        if: always()
        run: |
          LOG="$RUNNER_TEMP/harness.log"
          {
            echo "### ci-junit — headless harness results"
            echo ""
            if [ -f "$LOG" ]; then
              echo '```'
              grep -E '^SUMMARY:|^KNOWN-FAILING|^RESULT:' "$LOG" || echo "(no summary lines — see the step log)"
              echo '```'
              echo ""
              echo "Quarantined (non-gating, tools/known-failing-tests.txt):"
              echo '```'
              grep -E '^\[KNOWN' "$LOG" || echo "(none)"
              echo '```'
            else
              echo "_Harness log not found — the suite likely failed to compile; see the run step log._"
            fi
            echo ""
            echo "_Full surefire XML is attached as the \`junit-xml\` artifact._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Lane 2 — ci-pde : the SWT-display bucket under xvfb  (ACTIVE — Group B)
  # ---------------------------------------------------------------------------
  # Runs the 3 display-required classes from tools/osgi-excluded-tests.txt that
  # ci-junit cannot: they need a live SWT Display (NOT an OSGi platform). The
  # mechanism is the SAME M0-1 harness (tools/run-tests.sh), UNMODIFIED, in
  # explicit-FQCN mode, wrapped in `xvfb-run` so SWT binds to a virtual display.
  # `--swt` is a macOS-only no-op (it just adds -XstartOnFirstThread), so it is
  # NOT passed here — on Linux the display comes from xvfb, not a JVM flag.
  #
  # GROUP A (6 OSGi/Archi-runtime classes: McpServerManagerTest,
  # McpPreferenceInitializerTest, ViewExportServiceTest, ImagePathArchiveValidationTest,
  # DeleteViewCascadeIntegrationTest, RemoveFromViewCascadeIntegrationTest) is
  # DEFERRED — backlog row ci-pde-osgi-pde-testapp-spike. The m0-2b SPIKE proved
  # the provisioned Archi RCP ships no PDE JUnit runtime bundles, so a headless
  # coretestapplication needs extra bundle provisioning (audit: "diminishing
  # returns"); those 6 stay owner-gated via the Eclipse AllPluginTestsRunner.
  #
  # Reuses ci-junit's Archi + ~/.m2 provisioning with the SAME cache keys (AC-6),
  # so the ~166 MB Archi tarball and the Mockito/JUnit stack are not re-fetched.
  # ===========================================================================
  ci-pde:
    name: ci-pde (display bucket under xvfb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # The display trio recompiles prod from source and packages prod.jar; `zip`
      # strips its directory entries for resource-semantics parity (as in ci-junit).
      # `xvfb` provides the virtual framebuffer the SWT Display binds to. The
      # `apt-get update` is unconditional (not guarded like ci-junit's zip check):
      # xvfb is never pre-installed on ubuntu-latest, so the index refresh is
      # always required before the install can resolve it.
      - name: Install xvfb + zip
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb zip

      # Resolve the effective Archi version: workflow_dispatch input wins, else the
      # pinned env default (same single source of truth as ci-junit).
      - name: Resolve Archi version
        id: archi
        env:
          INPUT_VERSION: ${{ github.event.inputs.archi_version }}
          DEFAULT_VERSION: ${{ env.ARCHI_VERSION }}
        run: |
          VERSION="${INPUT_VERSION:-$DEFAULT_VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Provisioning Archi $VERSION"

      # AC-6: SAME cache key as ci-junit so a warm run restores ~/archi-dist and
      # skips the ~166 MB download (the `if: cache-hit != true` guard below).
      - name: Cache Archi distribution
        id: cache-archi
        uses: actions/cache@v4
        with:
          path: ~/archi-dist
          key: archi-${{ runner.os }}-${{ steps.archi.outputs.version }}

      - name: Download + extract Archi (cache miss only)
        if: steps.cache-archi.outputs.cache-hit != 'true'
        env:
          VERSION: ${{ steps.archi.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://github.com/archimatetool/archi.io/releases/download/${VERSION}/Archi-Linux64-${VERSION}.tgz"
          echo "Downloading $URL"
          mkdir -p ~/archi-dist
          curl -fsSL --retry 3 -o /tmp/archi.tgz "$URL"
          tar xzf /tmp/archi.tgz -C ~/archi-dist
          rm -f /tmp/archi.tgz

      # ARCHI_HOME is the dir containing plugins/ (Linux layout: <extract>/Archi).
      - name: Locate ARCHI_HOME
        id: archihome
        run: |
          set -euo pipefail
          plugins_dir="$(find "$HOME/archi-dist" -maxdepth 3 -type d -name plugins | head -1)"
          [ -n "$plugins_dir" ] || { echo "::error::no plugins/ dir found under ~/archi-dist (corrupt or empty Archi cache?)"; exit 1; }
          ARCHI_HOME="$(dirname "$plugins_dir")"
          [ -d "$ARCHI_HOME/plugins" ] || { echo "::error::ARCHI_HOME/plugins not found under ~/archi-dist"; exit 1; }
          echo "ARCHI_HOME=$ARCHI_HOME" >> "$GITHUB_ENV"
          echo "Archi plugin jars: $(find "$ARCHI_HOME/plugins" -name '*.jar' | wc -l) (ARCHI_HOME=$ARCHI_HOME)"

      # AC-6: SAME cache key as ci-junit, keyed on the pinned-coordinate pom.
      - name: Cache Maven repository (Mockito + JUnit/Hamcrest)
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ runner.os }}-${{ hashFiles('tools/ci/pom.xml') }}
          restore-keys: |
            m2-${{ runner.os }}-

      # Provision the same Mockito stack + Eclipse-named JUnit/Hamcrest glob the
      # harness reads — identical to ci-junit so tools/run-tests.sh stays unmodified.
      - name: Provision test dependencies (Mockito + Eclipse-named JUnit/Hamcrest)
        id: deps
        run: |
          set -euo pipefail
          mvn -q -B -f tools/ci/pom.xml dependency:go-offline
          M2="$HOME/.m2/repository"
          ECLIPSE_HOME="$RUNNER_TEMP/eclipse-junit"
          mkdir -p "$ECLIPSE_HOME/plugins"
          cp "$M2/junit/junit/4.13.2/junit-4.13.2.jar"            "$ECLIPSE_HOME/plugins/org.junit_4.13.2.jar"
          cp "$M2/org/hamcrest/hamcrest/3.0/hamcrest-3.0.jar"     "$ECLIPSE_HOME/plugins/org.hamcrest_3.0.0.jar"
          echo "ECLIPSE_HOME=$ECLIPSE_HOME" >> "$GITHUB_ENV"
          ls -1 "$ECLIPSE_HOME/plugins"

      # AC-1: the 3 display classes via the UNMODIFIED harness in explicit-FQCN
      # mode, wrapped in `xvfb-run` so SWT binds to a virtual display. DISTINCT
      # BUILD_DIR/RESULTS_DIR so this lane's artifacts never collide with ci-junit's.
      # The harness exit code is the sole gate (no `|| true`); `set -euo pipefail`
      # propagates a non-zero harness exit over tee's 0 (M0-2 LOW-1). An explicit
      # 24-bit screen geometry makes the virtual display deterministic across
      # runner images (some default to a depth GEF/SWT image ops dislike).
      - name: Run display trio under xvfb
        run: |
          set -euo pipefail
          ARCHI_HOME="$ARCHI_HOME" \
          ECLIPSE_HOME="$ECLIPSE_HOME" \
          M2_REPO="$HOME/.m2/repository" \
          BUILD_DIR="$GITHUB_WORKSPACE/build/test-harness-pde" \
          RESULTS_DIR="$GITHUB_WORKSPACE/build/test-results-pde-display" \
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bash tools/run-tests.sh \
            net.vheerden.archi.mcp.model.SwtUiThreadDispatcherTest \
            net.vheerden.archi.mcp.model.SpacingControlLoopPartialCommitRegressionTest \
            net.vheerden.archi.mcp.model.ArchiModelAccessorImplTest \
            | tee "$RUNNER_TEMP/harness-pde.log"

      # AC-5: publish the surefire XML even when the suite is red. DISTINCT
      # artifact name (junit-xml-pde) — same name as ci-junit's would collide.
      - name: Upload JUnit XML (display bucket)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-xml-pde
          path: build/test-results-pde-display/*.xml
          if-no-files-found: warn

      # AC-5: human-readable summary on the job's own (correctly green/red) summary
      # tab — NOT a separate check run (M0-2's false-red lesson). The job's red/green
      # is the harness exit code. Group B runs explicit FQCNs (no manifest scan, no
      # quarantine), so there are no [KNOWN] lines to surface.
      - name: Test summary
        if: always()
        run: |
          LOG="$RUNNER_TEMP/harness-pde.log"
          {
            echo "### ci-pde — display bucket (xvfb) results"
            echo ""
            echo "_Group B (3 SWT-display classes) via the unmodified M0-1 harness under xvfb._"
            echo "_Group A (6 OSGi/Archi-runtime classes) is deferred — backlog row ci-pde-osgi-pde-testapp-spike._"
            echo ""
            if [ -f "$LOG" ]; then
              echo '```'
              grep -E '^SUMMARY:|^RESULT:|^\[(ok|FAIL)' "$LOG" || echo "(no summary lines — see the step log)"
              echo '```'
            else
              echo "_Harness log not found — the suite likely failed to compile; see the run step log._"
            fi
            echo ""
            echo "_Full surefire XML is attached as the \`junit-xml-pde\` artifact._"
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Lane 3 — ci-ratchet : the god-object no-growth pawl (ACTIVE)
  # ===========================================================================
  # ArchiModelAccessorImpl is a thick orchestration facade being decomposed
  # cluster-by-cluster behind its unchanged interface. This lane is a pure shell
  # guard — no Archi, no JDK, no display — that fails the build if the facade
  # grows (LOC / public surface) or if the ArchiModelAccessor interface signature
  # drifts from the committed baseline. A guideline can slip; a ratchet cannot.
  # The ceilings can only ever be lowered (in the same PR that shrinks the file).
  ci-ratchet:
    name: ci-ratchet (god-object no-growth pawl)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce size + interface-signature ratchet
        run: bash tools/size-ratchet.sh
